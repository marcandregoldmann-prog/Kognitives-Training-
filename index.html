<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schlaue Köpfe - Das Lernspiel</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#5A5A40" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <style>
      html, body { height: 100%; margin: 0; padding: 0; background-color: #f5f5f0; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root">
      <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;font-family:sans-serif;color:#555;">
        <div style="margin-bottom:20px;font-size:20px;">Lade Spiel...</div>
        <div style="font-size:12px;color:#888;">Bitte warten...</div>
      </div>
    </div>
    <script>
      // Global error handler to catch and display errors on mobile
      window.onerror = function(message, source, lineno, colno, error) {
        const errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:#ffebee;color:#b71c1c;padding:20px;z-index:9999;border-bottom:2px solid #b71c1c;font-family:monospace;overflow:auto;max-height:50vh;box-shadow:0 4px 6px rgba(0,0,0,0.1);word-break:break-word;';
        errorDiv.innerHTML = '<strong style="font-size:1.2em">Application Error:</strong><br>' + message + '<br><small>' + source + ':' + lineno + ':' + colno + '</small><br><pre style="white-space:pre-wrap;word-break:break-word;">' + (error && error.stack ? error.stack : '') + '</pre><button onclick="this.parentElement.remove()" style="margin-top:10px;padding:8px 16px;background:#b71c1c;color:white;border:none;border-radius:4px;cursor:pointer;">Dismiss</button>';
        document.body.appendChild(errorDiv);
        return false;
      };

      window.onunhandledrejection = function(event) {
        const errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:#ffebee;color:#b71c1c;padding:20px;z-index:9999;border-bottom:2px solid #b71c1c;font-family:monospace;overflow:auto;max-height:50vh;box-shadow:0 4px 6px rgba(0,0,0,0.1);word-break:break-word;';
        errorDiv.innerHTML = '<strong style="font-size:1.2em">Unhandled Promise Rejection:</strong><br>' + event.reason + '<br><button onclick="this.parentElement.remove()" style="margin-top:10px;padding:8px 16px;background:#b71c1c;color:white;border:none;border-radius:4px;cursor:pointer;">Dismiss</button>';
        document.body.appendChild(errorDiv);
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
