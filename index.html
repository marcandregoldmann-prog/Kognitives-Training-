<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schlaue Köpfe - Das Lernspiel</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#5A5A40" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <style>
      html, body { height: 100%; margin: 0; padding: 0; background-color: #f5f5f0; }
      #root { min-height: 100vh; }
      .loading-container { display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; font-family: sans-serif; color: #555; }
      .loading-title { margin-bottom: 20px; font-size: 20px; }
      .loading-subtitle { font-size: 12px; color: #888; }
      .error-overlay { position: fixed; top: 0; left: 0; width: 100%; background: #ffebee; color: #b71c1c; padding: 20px; z-index: 9999; border-bottom: 2px solid #b71c1c; font-family: monospace; overflow: auto; max-height: 50vh; box-shadow: 0 4px 6px rgba(0,0,0,0.1); word-break: break-word; }
      .dismiss-btn { margin-top: 10px; padding: 8px 16px; background: #b71c1c; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-container">
        <div id="loading-text" class="loading-title">Lade Spiel...</div>
        <div id="loading-subtext" class="loading-subtitle">Bitte warten...</div>
      </div>
    </div>
    <script>
      // Global error handler
      function showError(title, message, details) {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-overlay';
        errorDiv.innerHTML = '<strong style="font-size:1.2em">' + title + '</strong><br>' + message +
          (details ? '<br><pre style="white-space:pre-wrap;word-break:break-word;">' + details + '</pre>' : '') +
          '<br><button onclick="this.parentElement.remove()" class="dismiss-btn">Dismiss</button>';
        document.body.appendChild(errorDiv);

        // Update loading text to indicate failure
        const loadingText = document.getElementById('loading-text');
        if (loadingText) loadingText.textContent = 'Fehler beim Laden';
        const loadingSub = document.getElementById('loading-subtext');
        if (loadingSub) loadingSub.textContent = 'Siehe Fehlermeldung oben.';
      }

      window.onerror = function(message, source, lineno, colno, error) {
        showError('Application Error', message, source + ':' + lineno + ':' + colno + '\n' + (error && error.stack ? error.stack : ''));
        return false;
      };

      window.onunhandledrejection = function(event) {
        showError('Unhandled Promise Rejection', event.reason);
      };

      // Catch resource loading errors (e.g. script 404)
      window.addEventListener('error', function(e) {
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
          showError('Resource Load Error', 'Failed to load resource: ' + (e.target.src || e.target.href));
        }
      }, true);

      // Timeout check
      setTimeout(function() {
        if (!window.appLoaded) {
          showError('Timeout Error', 'The application took too long to start.', 'Check your internet connection or try refreshing.');
        }
      }, 5000); // 5 seconds timeout
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
